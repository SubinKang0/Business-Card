<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>명함 미리보기</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Pretendard', sans-serif;
    background: #f0f0f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    gap: 48px;
  }
  h2 { font-size: 16px; color: #666; margin-bottom: 12px; }

  /*
    명함 비율: 92x52mm
    웹 미리보기: 544x307px (비율 약 5.913px/mm)
    일러 기준 폰트 사이즈 → 웹 환산: ×(544/92) ≈ ×5.913
      이름 18pt → ~106px... 너무 큼. 일러 기준 pt는 mm 단위이므로
      92mm 안의 18pt → 18/92 = 19.6% → 544 * 0.196 = 106px?
      원본 이미지 보면 이름이 카드 높이의 약 15% 정도.
      52mm 기준 18pt → 18pt ≈ 6.35mm → 6.35/52 = 12.2% of height → 307*0.122 ≈ 37px
      실제로는 좀 더 크게 보임. 이미지 기준으로 조정.

    비율 환산 (mm → px): 544/92 = 5.913
    이름: 18pt ≈ 6.35mm → 37.5px → 실제 이미지에서는 좀 더 크게 보임, ~42px
    직책: 10pt ≈ 3.53mm → 20.8px
    연락처: 6.5pt ≈ 2.29mm → 13.6px
    간격 25 → 25/92*544 ≈ 148px (패딩용)... 이건 요소간 간격이 아니라 여백?

    실제 이미지 비율에 맞게 시각 조정
  */

  .card {
    width: 544px;
    height: 307px;
    background: #fff;
    border-radius: 4px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    position: relative;
    overflow: hidden;
  }

  /* ========== 조코딩 AX파트너스 ========== */
  .jocoding .logo-area {
    position: absolute;
    top: 24px;
    left: 32px;
  }
  .jocoding .logo-area svg {
    height: 18px;
    width: auto;
  }

  .jocoding .name {
    position: absolute;
    top: 88px;
    left: 32px;
    font-size: 42px;
    font-weight: 700;
    color: #18181b;
    letter-spacing: 1.05px;
  }
  .jocoding .title {
    position: absolute;
    top: 142px;
    left: 34px;
    font-size: 21px;
    font-weight: 600;
    color: #18181b;
    letter-spacing: 0.525px;
  }
  .jocoding .contact-area {
    position: absolute;
    bottom: 28px;
    left: 32px;
    display: flex;
    flex-direction: column;
    gap: 9px;
  }
  .jocoding .contact-row {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    font-weight: 600;
    color: #18181b;
    letter-spacing: 0.325px;
  }
  .jocoding .contact-row svg {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
  }
  .jocoding .email-phone-row {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  /* 조코딩 심볼 그래픽 */
  .jocoding .symbol {
    position: absolute;
    right: -10px;
    top: -20px;
    width: 240px;
    height: auto;
  }

  /* ========== 대모산개발단 ========== */
  .demodev .logo-area {
    position: absolute;
    top: 26px;
    left: 32px;
  }
  .demodev .logo-area svg {
    height: 18px;
    width: auto;
  }
  .demodev .qr-area {
    position: absolute;
    top: 18px;
    right: 24px;
    width: 88px;
    height: 88px;
  }
  .demodev .qr-area img {
    width: 100%;
    height: 100%;
  }
  .demodev .name {
    position: absolute;
    top: 92px;
    left: 32px;
    font-size: 42px;
    font-weight: 700;
    color: #18181b;
    letter-spacing: 1.05px;
  }
  .demodev .title {
    position: absolute;
    top: 146px;
    left: 34px;
    font-size: 21px;
    font-weight: 600;
    color: #18181b;
    letter-spacing: 0.525px;
  }
  .demodev .contact-area {
    position: absolute;
    bottom: 28px;
    left: 32px;
    right: 28px;
    display: flex;
    justify-content: space-between;
  }
  .demodev .contact-col {
    display: flex;
    flex-direction: column;
    gap: 9px;
  }
  .demodev .contact-row {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    font-weight: 600;
    color: #18181b;
    letter-spacing: 0.325px;
  }
  .demodev .contact-row svg {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
  }
</style>
</head>
